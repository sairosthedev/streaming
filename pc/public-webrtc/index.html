<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Live Camera</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d10;
    --panel: #14171b;
    --line: #23272d;
    --text: #e6e8eb;
    --muted: #9aa2ab;
    --dim: #5c646d;
    --live: #22c55e;
    --warn: #eab308;
    --error: #ef4444;
  }

  body {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .shell { width: 100%; max-width: 1100px; }

  .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .bar .status { margin-left: auto; font-size: 13px; color: var(--muted); }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--dim); }
  .dot.live  { background: var(--live);  box-shadow: 0 0 0 4px rgb(34 197 94 / 0.15); }
  .dot.wait  { background: var(--warn);  animation: pulse 1.4s ease-in-out infinite; }
  .dot.error { background: var(--error); box-shadow: 0 0 0 4px rgb(239 68 68 / 0.15); }

  @keyframes pulse { 50% { opacity: 0.35; } }

  .stage {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }

  video { width: 100%; height: 100%; display: block; object-fit: contain; }

  .overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
    background: var(--bg);
  }
  .overlay[hidden] { display: none; }

  .spinner {
    width: 26px; height: 26px;
    margin: 0 auto 14px;
    border: 2px solid #2a2f36;
    border-top-color: #6b7480;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay p { color: var(--muted); font-size: 14px; }
  .overlay .hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--dim);
    max-width: 52ch;
    line-height: 1.6;
  }

  form { display: flex; gap: 8px; justify-content: center; }

  input, button { font: inherit; border-radius: 8px; border: 1px solid var(--line); padding: 9px 14px; }
  input { width: 220px; background: var(--panel); color: var(--text); }
  input:focus { outline: none; border-color: #4b5259; }
  button { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; cursor: pointer; }
  button:hover { background: #fff; }
  button:disabled { opacity: 0.5; cursor: default; }

  .err { min-height: 1.4em; margin-top: 10px; font-size: 13px; color: #f87171; }

  .foot {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--dim);
  }

  .tag {
    font-family: ui-monospace, Consolas, monospace;
    color: var(--live);
  }
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <span class="dot wait" id="dot"></span>
    <h1>Live Camera</h1>
    <span class="status" id="status">Starting...</span>
  </div>

  <div class="stage">
    <video id="video" playsinline muted autoplay controls></video>

    <div class="overlay" id="gate" hidden>
      <div>
        <p style="margin-bottom:16px">This feed is password protected.</p>
        <form id="loginForm">
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit" id="loginBtn">Watch</button>
        </form>
        <div class="err" id="loginError"></div>
      </div>
    </div>

    <div class="overlay" id="loader">
      <div>
        <div class="spinner"></div>
        <p id="loaderText">Connecting to camera...</p>
        <div class="hint" id="loaderHint"></div>
      </div>
    </div>
  </div>

  <div class="foot">
    <span class="tag" id="latency">WebRTC &middot; sub-second</span>
    <span>Unlimited &middot; served from this PC</span>
  </div>
</div>

<script>
const video      = document.getElementById('video');
const dot        = document.getElementById('dot');
const statusEl   = document.getElementById('status');
const gate       = document.getElementById('gate');
const loader     = document.getElementById('loader');
const loaderText = document.getElementById('loaderText');
const loaderHint = document.getElementById('loaderHint');
const loginForm  = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const loginBtn   = document.getElementById('loginBtn');
const passwordEl = document.getElementById('password');

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

function setStatus(state, text) {
  dot.className = 'dot ' + state;
  statusEl.textContent = text;
}

async function boot() {
  const cfg = await (await fetch('/api/config')).json();

  if (cfg.requiresPassword && !cfg.authenticated) {
    loader.hidden = true;
    gate.hidden = false;
    setStatus('wait', 'Locked');
    passwordEl.focus();
    return;
  }

  gate.hidden = true;
  loader.hidden = false;
  start();
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.textContent = '';
  loginBtn.disabled = true;

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: passwordEl.value }),
  });

  loginBtn.disabled = false;

  if (!res.ok) {
    loginError.textContent = 'Wrong password.';
    passwordEl.value = '';
    return;
  }

  gate.hidden = true;
  loader.hidden = false;
  start();
});

/**
 * WHEP: POST an SDP offer, get an SDP answer, and the media then flows
 * peer-to-peer. There are no segments and no playlist -- this is a continuous
 * stream, which is why it lands under a second instead of 6-10.
 */
let pc = null;
let retryDelay = 1000;

async function start() {
  setStatus('wait', 'Connecting...');

  // The camera is pulled on demand, so it can take a few seconds to come up on
  // the first connection. Wait for it rather than failing the handshake.
  for (let i = 0; i < 30; i++) {
    try {
      const s = await (await fetch('/api/stream/status', { cache: 'no-store' })).json();
      if (s.ready) break;
      if (i > 4 && s.error) loaderHint.textContent = s.error;
    } catch { /* server still starting */ }
    await sleep(1000);
  }

  connect();
}

async function connect() {
  cleanup();

  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
  });

  // Receive-only: we never send media to the camera.
  pc.addTransceiver('video', { direction: 'recvonly' });
  pc.addTransceiver('audio', { direction: 'recvonly' });

  pc.ontrack = (e) => {
    if (video.srcObject !== e.streams[0]) {
      video.srcObject = e.streams[0];
      video.play().catch(() => {});
    }
  };

  pc.onconnectionstatechange = () => {
    if (!pc) return;

    if (pc.connectionState === 'connected') {
      loader.hidden = true;
      setStatus('live', 'Live');
      retryDelay = 1000;
    } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      // A camera feed should survive a network blip. Back off so a hard failure
      // (no route to the peer) does not spin.
      setStatus('wait', 'Reconnecting...');
      loader.hidden = false;
      loaderText.textContent = 'Reconnecting...';
      setTimeout(connect, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 15000);
    }
  };

  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    // Wait for ICE gathering to finish so the offer carries every candidate.
    // Trickling them separately is possible but this is simpler and the delay
    // is a few hundred ms at most on a LAN.
    await iceGatheringComplete(pc);

    const res = await fetch('/webrtc/whep', {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: pc.localDescription.sdp,
    });

    if (res.status === 401) {
      // Session expired mid-watch.
      location.reload();
      return;
    }

    if (!res.ok) {
      throw new Error(`server returned ${res.status}`);
    }

    const answer = await res.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answer });
  } catch (err) {
    setStatus('error', 'Connection failed');
    loader.hidden = false;
    loaderText.textContent = 'Could not connect to the camera.';
    loaderHint.textContent = err.message;
    setTimeout(connect, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 15000);
  }
}

function iceGatheringComplete(peer) {
  if (peer.iceGatheringState === 'complete') return Promise.resolve();

  return new Promise((resolve) => {
    // Don't hang forever if a STUN server is unreachable -- the candidates we
    // already have (usually host/LAN ones) are often enough.
    const timer = setTimeout(resolve, 3000);

    peer.addEventListener('icegatheringstatechange', () => {
      if (peer.iceGatheringState === 'complete') {
        clearTimeout(timer);
        resolve();
      }
    });
  });
}

function cleanup() {
  if (pc) {
    pc.onconnectionstatechange = null;
    pc.ontrack = null;
    pc.close();
    pc = null;
  }
}

window.addEventListener('beforeunload', cleanup);

boot();
</script>
</body>
</html>
