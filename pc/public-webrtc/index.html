<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Titan CCTV</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0b0d10;
    --panel: #14171b;
    --line: #23272d;
    --text: #e6e8eb;
    --muted: #9aa2ab;
    --dim: #5c646d;
    --live: #22c55e;
    --warn: #eab308;
    --error: #ef4444;
  }

  body {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 16px;
    background: var(--bg);
    color: var(--text);
    font: 15px/1.5 system-ui, -apple-system, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .shell { width: 100%; max-width: 1100px; }

  .bar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .bar h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  .bar .status { margin-left: auto; font-size: 13px; color: var(--muted); }

  .dot { width: 8px; height: 8px; border-radius: 50%; flex: none; background: var(--dim); }
  .dot.live  { background: var(--live);  box-shadow: 0 0 0 4px rgb(34 197 94 / 0.15); }
  .dot.wait  { background: var(--warn);  animation: pulse 1.4s ease-in-out infinite; }
  .dot.error { background: var(--error); box-shadow: 0 0 0 4px rgb(239 68 68 / 0.15); }

  @keyframes pulse { 50% { opacity: 0.35; } }

  .cams {
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .cams.on { display: flex; }

  .cams button {
    font: inherit;
    font-size: 13px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cams button:hover { color: var(--text); border-color: #4b5259; }
  .cams button.active {
    color: var(--text);
    border-color: var(--live);
    background: rgb(34 197 94 / 0.08);
  }
  .cams .camdot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
  .cams .camdot.up { background: var(--live); }

  .stage {
    position: relative;
    aspect-ratio: 16 / 9;
    background: #000;
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
  }

  video { width: 100%; height: 100%; display: block; object-fit: contain; }

  .overlay {
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    text-align: center;
    background: var(--bg);
  }
  .overlay[hidden] { display: none; }

  .spinner {
    width: 26px; height: 26px;
    margin: 0 auto 14px;
    border: 2px solid #2a2f36;
    border-top-color: #6b7480;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .overlay p { color: var(--muted); font-size: 14px; }
  .overlay .hint {
    margin-top: 12px;
    font-size: 12px;
    color: var(--dim);
    max-width: 52ch;
    line-height: 1.6;
  }

  form { display: flex; gap: 8px; justify-content: center; }

  input, .overlay button { font: inherit; border-radius: 8px; border: 1px solid var(--line); padding: 9px 14px; }
  input { width: 220px; background: var(--panel); color: var(--text); }
  input:focus { outline: none; border-color: #4b5259; }
  .overlay button { background: var(--text); color: var(--bg); border-color: var(--text); font-weight: 500; cursor: pointer; }
  .overlay button:hover { background: #fff; }
  .overlay button:disabled { opacity: 0.5; cursor: default; }

  .err { min-height: 1.4em; margin-top: 10px; font-size: 13px; color: #f87171; }

  .foot {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 12px;
    color: var(--dim);
  }

  .tag { font-family: ui-monospace, Consolas, monospace; color: var(--live); }
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <span class="dot wait" id="dot"></span>
    <h1>Titan CCTV</h1>
    <span class="status" id="status">Starting...</span>
  </div>

  <div class="cams" id="cams"></div>

  <div class="stage">
    <video id="video" playsinline muted autoplay controls></video>

    <div class="overlay" id="gate" hidden>
      <div>
        <p style="margin-bottom:16px">This feed is password protected.</p>
        <form id="loginForm">
          <input id="password" type="password" placeholder="Password" autocomplete="current-password" />
          <button type="submit" id="loginBtn">Watch</button>
        </form>
        <div class="err" id="loginError"></div>
      </div>
    </div>

    <div class="overlay" id="loader">
      <div>
        <div class="spinner"></div>
        <p id="loaderText">Connecting to camera...</p>
        <div class="hint" id="loaderHint"></div>
      </div>
    </div>
  </div>

  <div class="foot">
    <span class="tag">WebRTC &middot; sub-second</span>
    <span>Unlimited &middot; served from this PC</span>
  </div>
</div>

<script>
const video      = document.getElementById('video');
const dot        = document.getElementById('dot');
const statusEl   = document.getElementById('status');
const gate       = document.getElementById('gate');
const loader     = document.getElementById('loader');
const loaderText = document.getElementById('loaderText');
const loaderHint = document.getElementById('loaderHint');
const loginForm  = document.getElementById('loginForm');
const loginError = document.getElementById('loginError');
const loginBtn   = document.getElementById('loginBtn');
const passwordEl = document.getElementById('password');
const camsEl     = document.getElementById('cams');

const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

let cameras = [];       // [{name,label,ready}]
let current = null;     // selected camera name
let pc = null;
let retryDelay = 1000;

function setStatus(state, text) {
  dot.className = 'dot ' + state;
  statusEl.textContent = text;
}

async function boot() {
  const cfg = await (await fetch('/api/config')).json();

  if (cfg.requiresPassword && !cfg.authenticated) {
    loader.hidden = true;
    gate.hidden = false;
    setStatus('wait', 'Locked');
    passwordEl.focus();
    return;
  }

  gate.hidden = true;
  loader.hidden = false;
  enter();
}

loginForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  loginError.textContent = '';
  loginBtn.disabled = true;

  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: passwordEl.value }),
  });

  loginBtn.disabled = false;

  if (!res.ok) {
    loginError.textContent = 'Wrong password.';
    passwordEl.value = '';
    return;
  }

  gate.hidden = true;
  loader.hidden = false;
  enter();
});

/** After auth: discover cameras, render the picker, pick one, connect. */
async function enter() {
  setStatus('wait', 'Loading cameras...');

  await refreshCameras();

  if (!cameras.length) {
    setStatus('error', 'No cameras');
    loaderText.textContent = 'No cameras are configured.';
    loaderHint.textContent = 'Add one on the server: npm run cameras -- add ...';
    return;
  }

  // Deep link: ?cam=<name>. Otherwise first ready camera, otherwise first.
  const wanted = new URLSearchParams(location.search).get('cam');
  current =
    cameras.find((c) => c.name === wanted)?.name ??
    cameras.find((c) => c.ready)?.name ??
    cameras[0].name;

  renderPicker();
  watch(current);

  // Keep readiness dots fresh.
  setInterval(async () => {
    await refreshCameras();
    renderPicker();
  }, 10_000);
}

async function refreshCameras() {
  try {
    const res = await fetch('/api/cameras', { cache: 'no-store' });
    if (res.status === 401) { location.reload(); return; }
    const data = await res.json();
    cameras = data.cameras ?? [];
    if (data.error && !cameras.some((c) => c.ready)) loaderHint.textContent = data.error;
  } catch {
    // Server unreachable; keep the last list.
  }
}

function renderPicker() {
  // One camera needs no picker.
  camsEl.className = cameras.length > 1 ? 'cams on' : 'cams';
  camsEl.innerHTML = '';

  for (const cam of cameras) {
    const btn = document.createElement('button');
    btn.className = cam.name === current ? 'active' : '';

    const d = document.createElement('span');
    d.className = 'camdot' + (cam.ready ? ' up' : '');
    btn.appendChild(d);
    btn.appendChild(document.createTextNode(cam.label));

    btn.addEventListener('click', () => {
      if (cam.name === current) return;
      current = cam.name;
      history.replaceState(null, '', '?cam=' + encodeURIComponent(cam.name));
      renderPicker();
      watch(cam.name);
    });

    camsEl.appendChild(btn);
  }
}

/** Wait for the chosen camera to have video, then connect to it. */
async function watch(name) {
  cleanup();
  loader.hidden = false;
  loaderText.textContent = 'Connecting to camera...';
  loaderHint.textContent = '';
  setStatus('wait', 'Connecting...');
  retryDelay = 1000;

  for (let i = 0; i < 30; i++) {
    if (current !== name) return; // user switched away while we waited
    const cam = cameras.find((c) => c.name === name);
    if (cam?.ready) break;
    await refreshCameras();
    await sleep(1000);
  }

  connect(name);
}

async function connect(name) {
  if (current !== name) return;
  cleanup();

  pc = new RTCPeerConnection({
    iceServers: [{ urls: 'stun:stun.l.google.com:19302' }],
  });

  // Receive-only, video only. Most IP cameras send no audio track, and
  // negotiating an audio transceiver against a source that has none leaves an
  // empty audio stream that e.streams[0] can resolve to -- the element then
  // holds a stream with no video track and renders grey while the connection
  // reports "connected".
  pc.addTransceiver('video', { direction: 'recvonly' });

  const stream = new MediaStream();

  pc.ontrack = (e) => {
    stream.addTrack(e.track);
    if (video.srcObject !== stream) video.srcObject = stream;

    video.play().catch(() => {
      setStatus('wait', 'Click to play');
      loader.hidden = false;
      loaderText.textContent = 'Click anywhere to start the video.';
      document.body.addEventListener(
        'click',
        () => { video.play().catch(() => {}); loader.hidden = true; },
        { once: true },
      );
    });
  };

  // "Live" means frames are on screen, not merely that the peer connection
  // opened -- reporting live on connectionState is how a grey screen once
  // looked like a working stream.
  video.addEventListener('playing', onPlaying);

  pc.onconnectionstatechange = () => {
    if (!pc) return;

    if (pc.connectionState === 'connected') {
      setStatus('wait', 'Receiving...');
      retryDelay = 1000;
    } else if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      setStatus('wait', 'Reconnecting...');
      loader.hidden = false;
      loaderText.textContent = 'Reconnecting...';
      const target = name;
      setTimeout(() => { if (current === target) connect(target); }, retryDelay);
      retryDelay = Math.min(retryDelay * 2, 15000);
    }
  };

  try {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await iceGatheringComplete(pc);

    const res = await fetch(`/webrtc/whep/${encodeURIComponent(name)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/sdp' },
      body: pc.localDescription.sdp,
    });

    if (res.status === 401) { location.reload(); return; }
    if (!res.ok) throw new Error(`server returned ${res.status}`);

    const answer = await res.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answer });

    watchForFrames(name);
  } catch (err) {
    setStatus('error', 'Connection failed');
    loader.hidden = false;
    loaderText.textContent = 'Could not connect to the camera.';
    loaderHint.textContent = err.message;
    const target = name;
    setTimeout(() => { if (current === target) connect(target); }, retryDelay);
    retryDelay = Math.min(retryDelay * 2, 15000);
  }
}

function onPlaying() {
  loader.hidden = true;
  setStatus('live', 'Live');
  retryDelay = 1000;
}

/**
 * A peer connection can be "connected" while zero frames decode -- codec
 * mismatch, dead track. The symptom is a grey rectangle with a green dot.
 * Read framesDecoded and say what is actually happening.
 */
function watchForFrames(name) {
  const peer = pc;
  let elapsed = 0;

  const timer = setInterval(async () => {
    if (!pc || pc !== peer || current !== name) { clearInterval(timer); return; }

    elapsed += 2;

    let decoded = 0;
    let received = 0;
    const stats = await pc.getStats();
    stats.forEach((r) => {
      if (r.type === 'inbound-rtp' && r.kind === 'video') {
        decoded = r.framesDecoded ?? 0;
        received = r.bytesReceived ?? 0;
      }
    });

    if (decoded > 0) { clearInterval(timer); return; }

    if (elapsed >= 8) {
      clearInterval(timer);
      setStatus('error', 'No video');
      loader.hidden = false;
      loaderText.textContent = 'Connected, but no video is decoding.';
      loaderHint.textContent =
        received > 0
          ? `Receiving data (${Math.round(received / 1024)} KB) but decoding no frames - the camera may be sending a format this browser cannot play.`
          : 'No video data is arriving. The connection is open but the camera track never started.';
    }
  }, 2000);
}

function iceGatheringComplete(peer) {
  if (peer.iceGatheringState === 'complete') return Promise.resolve();
  return new Promise((resolve) => {
    const timer = setTimeout(resolve, 3000);
    peer.addEventListener('icegatheringstatechange', () => {
      if (peer.iceGatheringState === 'complete') { clearTimeout(timer); resolve(); }
    });
  });
}

function cleanup() {
  video.removeEventListener('playing', onPlaying);
  if (pc) {
    pc.onconnectionstatechange = null;
    pc.ontrack = null;
    pc.close();
    pc = null;
  }
  video.srcObject = null;
}

window.addEventListener('beforeunload', cleanup);

boot();
</script>
</body>
</html>
